<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Topic Thumbnail Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #0A0A0A;
      overflow-x: hidden;
    }

    /* Phone frame container */
    .phone-frame {
      width: 100%;
      max-width: 430px;
      min-height: 100%;
      margin: 0 auto;
      background-color: #0A0A0A;
      display: flex;
      flex-direction: column;
      position: relative;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #FFFFFF;
      padding-bottom: 80px;
    }

    /* Desktop: show phone frame border */
    @media (min-width: 431px) {
      html, body {
        background: #000;
      }
      .phone-frame {
        border-radius: 40px;
        border: 3px solid #222;
        margin-top: 10px;
        min-height: auto;
        height: 932px;
        overflow: hidden;
        padding-bottom: 0;
      }
    }

    /* Status bar only on desktop frame */
    .status-bar {
      display: none;
    }

    @media (min-width: 431px) {
      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 24px 6px;
        flex-shrink: 0;
      }
      .status-bar-left { font-size: 16px; font-weight: 600; }
      .camera-cutout { width: 22px; height: 22px; background: #000; border-radius: 50%; }
      .status-bar-right { display: flex; align-items: center; gap: 6px; }
      .status-bar-right svg { width: 18px; height: 18px; }
    }

    /* ===== TOP NAV ===== */
    .top-nav {
      display: flex;
      align-items: center;
      padding: 8px 16px 12px;
      gap: 10px;
      flex-shrink: 0;
    }

    .app-logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #00C9A7, #00B4D8);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 22px;
      color: #fff;
      flex-shrink: 0;
    }

    .search-bar {
      flex: 1;
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 24px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #777;
      font-size: 14px;
    }

    .search-bar svg {
      width: 16px;
      height: 16px;
      opacity: 0.5;
    }

    .profile-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1A1A1A;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .profile-icon svg {
      width: 22px;
      height: 22px;
      color: #777;
    }

    /* ===== EPISODE CARDS ROW ===== */
    .episode-cards-row {
      padding: 4px 16px 10px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .episode-cards-row::-webkit-scrollbar {
      display: none;
    }

    .episode-small-card {
      min-width: 145px;
      flex-shrink: 0;
    }

    .episode-small-card img {
      width: 145px;
      height: 82px;
      object-fit: cover;
      border-radius: 10px;
    }

    .episode-small-card .card-title {
      font-size: 12px;
      color: #ccc;
      margin-top: 6px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .episode-small-card .card-episode {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .episode-small-card .card-episode svg {
      width: 10px;
      height: 10px;
    }

    /* ===== SECTION HEADER ===== */
    .section-header {
      padding: 18px 16px 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
    }

    .shuffle-btn {
      background: #1A1A1A;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 8px 14px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }

    .shuffle-btn:active {
      background: #2A2A2A;
    }

    .shuffle-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ===== THUMBNAIL SCROLL ===== */
    .thumbnail-scroll-wrapper {
      flex-shrink: 0;
      overflow: hidden;
    }

    .thumbnail-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .thumbnail-scroll::-webkit-scrollbar {
      display: none;
    }

    .thumb-spacer {
      min-width: 16px;
      flex-shrink: 0;
    }

    .thumbnail-card {
      flex-shrink: 0;
      width: 48%;
      max-width: 210px;
      aspect-ratio: 1 / 2;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #1A1A1A;
      scroll-snap-align: start;
    }

    .thumbnail-card .thumb-image-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .thumbnail-card .thumb-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* No gradient overlay — thumbnails have their own design */

    /* Category label (New / Corrected) */
    .thumb-category-label {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 3;
    }

    .thumb-category-label.cat-new {
      background: #00C9A7;
      color: #000;
    }

    .thumb-category-label.cat-corrected {
      background: #7B61FF;
      color: #fff;
    }

    /* Badge */
    .thumb-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      z-index: 2;
    }

    .thumb-badge.new-episode {
      background: #1DB954;
      color: #000;
    }

    .thumb-badge.newly-added {
      background: #FFD700;
      color: #000;
    }

    .thumb-badge.trending {
      background: #FF4444;
      color: #fff;
    }

    .thumb-badge.popular {
      background: #FF8C00;
      color: #000;
    }

    /* Info overlay */
    .thumb-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 14px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
    }

    .thumb-episodes {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    .thumb-views {
      font-size: 13px;
      font-weight: 500;
      color: #ddd;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .thumb-views svg {
      width: 12px;
      height: 12px;
    }

    /* ===== BOTTOM SECTION ===== */
    .bottom-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .category-row {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-row .cat-icon {
      font-size: 20px;
    }

    .category-row .cat-title {
      font-size: 18px;
      font-weight: 600;
    }

    /* Small colored preview strip */
    .preview-strip {
      padding: 0 16px 8px;
      display: flex;
      gap: 8px;
      overflow: hidden;
      height: 28px;
      flex-shrink: 0;
    }

    .preview-strip-item {
      width: 80px;
      height: 24px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      background: #1A1A1A;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      z-index: 100;
    }

    @media (min-width: 431px) {
      .bottom-nav {
        position: static;
        flex-shrink: 0;
      }
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: #555;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    .nav-item.active {
      color: #00C9A7;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
    }

    .nav-item .nav-label {
      font-size: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="phone-frame">

    <!-- STATUS BAR -->
    <div class="status-bar">
      <div class="status-bar-left">9:30</div>
      <div class="camera-cutout"></div>
      <div class="status-bar-right">
        <svg viewBox="0 0 24 24" fill="white"><path d="M12 3C7.8 3 3.7 4.4 1 7l2 2c2.2-2.1 5.2-3.4 9-3.4s6.8 1.3 9 3.4l2-2c-2.7-2.6-6.8-4-11-4zm0 6c-2.7 0-5.2 1-7 2.6l2 2c1.4-1.3 3.2-2 5-2s3.6.7 5 2l2-2c-1.8-1.6-4.3-2.6-7-2.6zm0 6c-1.4 0-2.6.5-3.5 1.4L12 20l3.5-3.6c-.9-.9-2.1-1.4-3.5-1.4z"/></svg>
        <svg viewBox="0 0 24 24" fill="white"><path d="M2 22h20V2z M17 7v10h3V7h-3zm-4 3v7h3v-7h-3zm-4 3v4h3v-4H9z"/></svg>
        <svg viewBox="0 0 24 24" fill="white"><path d="M17 4h-3V2h-4v2H7v18h10V4zm-2 16H9V6h6v14z"/></svg>
      </div>
    </div>

    <!-- TOP NAV -->
    <div class="top-nav">
      <div class="app-logo">M</div>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>Search "Earning Money"</span>
      </div>
      <div class="profile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>

    <!-- EPISODE CARDS -->
    <div class="episode-cards-row">
      <div class="episode-small-card">
        <img src="https://www.figma.com/api/mcp/asset/fdd588db-bbda-41f5-bf16-7eabed4e4183" alt="Episode thumbnail">
        <div class="card-title">Acha YouTube content karana see...</div>
        <div class="card-episode">Episode 4 <svg viewBox="0 0 24 24" fill="#888"><path d="M10 17l5-5-5-5v10z"/></svg></div>
      </div>
      <div class="episode-small-card">
        <img src="https://www.figma.com/api/mcp/asset/e69bf0e3-4212-485f-a581-53a565e1a4e3" alt="Episode thumbnail">
        <div class="card-title">Acha YouTube content karana see...</div>
        <div class="card-episode">Episode 4 <svg viewBox="0 0 24 24" fill="#888"><path d="M10 17l5-5-5-5v10z"/></svg></div>
      </div>
      <div class="episode-small-card">
        <img src="https://www.figma.com/api/mcp/asset/a7c1b163-5e4b-4f5d-a8bc-fc6b084c9cdb" alt="Episode thumbnail">
        <div class="card-title">Acha YouTube content karana see...</div>
        <div class="card-episode">Episode 4 <svg viewBox="0 0 24 24" fill="#888"><path d="M10 17l5-5-5-5v10z"/></svg></div>
      </div>
    </div>

    <!-- SECTION HEADER (changes with tab) -->
    <div class="section-header">
      <div class="section-title" id="sectionTitle">New</div>
      <button class="shuffle-btn" onclick="shuffleCards()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        Shuffle
      </button>
    </div>

    <div class="thumbnail-scroll-wrapper">
    <div class="thumbnail-scroll" id="thumbnailScroll">
      <div class="thumb-spacer"></div>
      <!-- Cards loaded dynamically from Supabase -->
      <div class="thumb-spacer"></div>
    </div>
    </div>

    <!-- BOTTOM SECTION -->
    <div class="bottom-section">
      <div class="category-row">
        <span class="cat-icon">🏪</span>
        <span class="cat-title">Low Cost Business Ideas</span>
      </div>

      <div class="preview-strip">
        <div class="preview-strip-item" style="background: #E85D2A;"></div>
        <div class="preview-strip-item" style="background: #2D8B4E;"></div>
        <div class="preview-strip-item" style="background: #C4A82B;"></div>
      </div>
    </div>

    <!-- BOTTOM NAV — 3 Tabs -->
    <div class="bottom-nav">
      <button class="nav-item active" data-tab="new" onclick="switchTab('new')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <span class="nav-label">New</span>
      </button>
      <button class="nav-item" data-tab="corrected" onclick="switchTab('corrected')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        <span class="nav-label">Corrected</span>
      </button>
      <button class="nav-item" data-tab="mix" onclick="switchTab('mix')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
        <span class="nav-label">Mix</span>
      </button>
    </div>

  </div>

  <script>
    const BASE_URL = 'https://sluceerjagdurervugah.supabase.co/rest/v1/thumbnails';
    const API_KEY = 'sb_publishable_b3__Sf986sBq1bViplRBjQ_3n73U0Jl';
    let currentTab = 'new';

    const badgeClasses = {
      'New Episode': 'new-episode',
      'Newly Added': 'newly-added',
      'Trending': 'trending',
      'Popular': 'popular'
    };

    function createCard(thumb) {
      const card = document.createElement('div');
      card.className = 'thumbnail-card';

      const badgeHTML = thumb.badge
        ? `<div class="thumb-badge ${badgeClasses[thumb.badge] || 'new-episode'}">${thumb.badge === 'New Episode' ? '● ' : ''}${thumb.badge}</div>`
        : '';

      const episodesText = thumb.episodes ? `${thumb.episodes} Episodes` : '';
      const viewsText = thumb.views && thumb.views !== '0'
        ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> ${thumb.views}`
        : '';

      const catClass = thumb.category === 'corrected' ? 'cat-corrected' : 'cat-new';
      const catLabel = thumb.category === 'corrected' ? 'Corrected' : 'New';

      card.innerHTML = `
        <div class="thumb-image-wrapper">
          <img class="thumb-image" src="${thumb.image_url}" alt="${thumb.title || 'Thumbnail'}">
          ${badgeHTML}
          <span class="thumb-category-label ${catClass}">${catLabel}</span>
        </div>
        <div class="thumb-info">
          <span class="thumb-episodes">${episodesText}</span>
          <span class="thumb-views">${viewsText}</span>
        </div>
      `;
      return card;
    }

    function clearCards() {
      const scroll = document.getElementById('thumbnailScroll');
      const cards = scroll.querySelectorAll('.thumbnail-card, .thumb-placeholder');
      cards.forEach(c => c.remove());
    }

    // Shuffle array in place
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Cache fetched data per tab so shuffle doesn't re-fetch
    let cachedData = {};

    async function fetchThumbnails(category) {
      let url = BASE_URL + '?select=*&order=created_at.desc';
      if (category !== 'mix') {
        url += '&category=eq.' + category;
      }

      const res = await fetch(url, {
        headers: {
          'apikey': API_KEY,
          'Authorization': 'Bearer ' + API_KEY
        }
      });
      return await res.json();
    }

    function renderCards(data) {
      const scroll = document.getElementById('thumbnailScroll');
      const lastSpacer = scroll.querySelector('.thumb-spacer:last-child');

      clearCards();

      if (!data || data.length === 0) {
        const placeholder = document.createElement('div');
        placeholder.className = 'thumb-placeholder';
        placeholder.style.cssText = 'display:flex;align-items:center;justify-content:center;min-width:200px;height:420px;border:2px dashed #333;border-radius:16px;color:#555;font-size:14px;text-align:center;padding:20px;';
        placeholder.textContent = 'No ' + currentTab + ' thumbnails yet.';
        scroll.insertBefore(placeholder, lastSpacer);
        return;
      }

      data.forEach(thumb => {
        const card = createCard(thumb);
        scroll.insertBefore(card, lastSpacer);
      });

      scroll.scrollLeft = 0;
    }

    async function loadThumbnails(category) {
      try {
        const data = await fetchThumbnails(category);
        cachedData[category] = data;
        renderCards(shuffle([...data]));
      } catch (err) {
        console.error('Failed to load thumbnails:', err);
      }
    }

    function shuffleCards() {
      if (cachedData[currentTab] && cachedData[currentTab].length > 0) {
        renderCards(shuffle([...cachedData[currentTab]]));
      }
    }

    function switchTab(tab) {
      currentTab = tab;

      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.toggle('active', item.dataset.tab === tab);
      });

      const titles = { new: 'New', corrected: 'Corrected', mix: 'Mix' };
      document.getElementById('sectionTitle').textContent = titles[tab];

      loadThumbnails(tab);
    }

    // Load "new" tab by default (shuffled)
    loadThumbnails('new');
  </script>

</body>
</html>
